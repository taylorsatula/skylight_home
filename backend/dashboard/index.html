<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skylight Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="display--calm">

  <!-- Clock + Date (always visible on calm screen) -->
  <div class="clock__pill">
    <div class="clock">
      <span class="clock__time" id="clock-time"></span>
      <span class="clock__sep">|</span>
      <span class="clock__date" id="clock-date"></span>
    </div>
  </div>

  <!-- Countdown bar (photo frame timer) -->
  <div class="countdown-bar" id="countdown-bar">
    <div class="countdown-bar__fill" id="countdown-fill"></div>
  </div>

  <!-- Attention border -->
  <div class="attention-border"></div>

  <!-- Interrupt display (big, centered, one thing) -->
  <div class="interrupt" id="interrupt">
    <div class="interrupt__content" id="interrupt-content"></div>
    <button class="interrupt__dismiss" id="interrupt-dismiss" aria-label="Dismiss">
      <svg class="icon" viewBox="0 0 24 24" width="24" height="24">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Persistent dock -->
  <nav class="dock" id="dock">
    <!-- Built entirely by JS -->
  </nav>

  <script src="app.js"></script>
</body>
</html>
