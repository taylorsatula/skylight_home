<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

  <!-- PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Skylight">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="format-detection" content="telephone=no">

  <title>Skylight Home</title>

  <!-- PWA Icons -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="mobile.css">
</head>
<body>

  <!-- SVG SYMBOLS -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <defs>
      <!-- UI Icons -->
      <symbol id="icon-lightbulb" viewBox="0 0 24 24">

        <path d="M9 21h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>
      <symbol id="icon-fan" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="2" fill="currentColor"/>
        <path d="M12 2c-1.5 0-3 1.5-3 4 0 1.5.5 3 3 4M12 2c1.5 0 3 1.5 3 4 0 1.5-.5 3-3 4M2 12c0-1.5 1.5-3 4-3 1.5 0 3 .5 4 3M2 12c0 1.5 1.5 3 4 3 1.5 0 3-.5 4-3M22 12c0-1.5-1.5-3-4-3-1.5 0-3 .5-4 3M22 12c0 1.5-1.5 3-4 3-1.5 0-3-.5-4-3M12 22c-1.5 0-3-1.5-3-4 0-1.5.5-3 3-4M12 22c1.5 0 3-1.5 3-4 0-1.5-.5-3-3-4" fill="currentColor"/>
      </symbol>
      <symbol id="icon-plug" viewBox="0 0 24 24">
        <path d="M12 22v-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M9 17h6a4 4 0 0 0 4-4v-2a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v2a4 4 0 0 0 4 4z" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M8 9V2M16 9V2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>
      <symbol id="icon-sofa" viewBox="0 0 24 24">
        <path d="M4 11V8a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v3" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <path d="M3 14a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3z" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <path d="M6 19v2M18 19v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </symbol>
      <symbol id="icon-bed" viewBox="0 0 24 24">
        <path d="M2 17V8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v9" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <path d="M2 17h20v2H2z" fill="currentColor"/>
        <circle cx="7" cy="10" r="2" fill="currentColor"/>
        <path d="M2 14h20" stroke="currentColor" stroke-width="1.5"/>
      </symbol>
      <symbol id="icon-utensils" viewBox="0 0 24 24">
        <path d="M3 2v7c0 1.1.9 2 2 2h2a2 2 0 0 0 2-2V2M6 2v20M17 2v20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M17 2a3 3 0 0 1 3 3v2a3 3 0 0 1-3 3" stroke="currentColor" stroke-width="1.5" fill="none"/>
      </symbol>
      <symbol id="icon-home" viewBox="0 0 24 24">

      </symbol>
      <symbol id="icon-grid" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1" fill="currentColor"/>
        <rect x="14" y="3" width="7" height="7" rx="1" fill="currentColor"/>
        <rect x="3" y="14" width="7" height="7" rx="1" fill="currentColor"/>
        <rect x="14" y="14" width="7" height="7" rx="1" fill="currentColor"/>
      </symbol>
      <symbol id="icon-list" viewBox="0 0 24 24">
        <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </symbol>
      <symbol id="icon-x" viewBox="0 0 24 24">
        <path d="M18 6L6 18M6 6l12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-chevron-left" viewBox="0 0 24 24">
        <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-chevron-right" viewBox="0 0 24 24">
        <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="M20 6L9 17l-5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">

      </symbol>
      <symbol id="icon-wifi" viewBox="0 0 24 24">
        <path d="M5 12.55a11 11 0 0 1 14 0M8.53 16.11a6 6 0 0 1 6.95 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="20" r="1" fill="currentColor"/>
      </symbol>
      <symbol id="icon-wifi-off" viewBox="0 0 24 24">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="20" r="1" fill="currentColor"/>
      </symbol>
      <symbol id="icon-alert" viewBox="0 0 24 24">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" fill="none" stroke="currentColor" stroke-width="2"/>
        <line x1="12" y1="9" x2="12" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="17" r="1" fill="currentColor"/>
      </symbol>
      <symbol id="icon-clock" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <polyline points="12 6 12 12 16 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-check-circle" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M9 12l2 2 4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </symbol>
      <symbol id="icon-star" viewBox="0 0 24 24">
        <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="currentColor"/>
      </symbol>

      <!-- Weather Icons -->
      <symbol id="weather-sun" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="12" fill="#ffd60a"/>
        <g stroke="#ffd60a" stroke-width="3" stroke-linecap="round">
          <line x1="32" y1="8" x2="32" y2="14"/><line x1="32" y1="50" x2="32" y2="56"/>
          <line x1="8" y1="32" x2="14" y2="32"/><line x1="50" y1="32" x2="56" y2="32"/>
          <line x1="15" y1="15" x2="19.2" y2="19.2"/><line x1="44.8" y1="44.8" x2="49" y2="49"/>
          <line x1="15" y1="49" x2="19.2" y2="44.8"/><line x1="44.8" y1="19.2" x2="49" y2="15"/>
        </g>
      </symbol>
      <symbol id="weather-partly-cloudy" viewBox="0 0 64 64">
        <circle cx="22" cy="24" r="10" fill="#ffd60a"/>
        <g stroke="#ffd60a" stroke-width="2.5" stroke-linecap="round">
          <line x1="22" y1="6" x2="22" y2="10"/><line x1="6" y1="24" x2="10" y2="24"/>
          <line x1="10" y1="12" x2="13" y2="15"/><line x1="10" y1="36" x2="13" y2="33"/>
        </g>
        <path d="M52 44c4.4 0 8-3.6 8-8s-3.6-8-8-8c-.5 0-1 0-1.5.1C49.3 22.5 44.1 18 38 18c-7.7 0-14 6.3-14 14 0 .3 0 .7.1 1C19.2 33.5 16 37 16 41c0 4.4 3.6 8 8 8h28z" fill="#e5e5ea"/>
      </symbol>
      <symbol id="weather-cloudy" viewBox="0 0 64 64">
        <path d="M52 44c4.4 0 8-3.6 8-8s-3.6-8-8-8c-.5 0-1 0-1.5.1C49.3 22.5 44.1 18 38 18c-7.7 0-14 6.3-14 14 0 .3 0 .7.1 1C19.2 33.5 16 37 16 41c0 4.4 3.6 8 8 8h28z" fill="#a8b5c4"/>
      </symbol>
      <symbol id="weather-rain" viewBox="0 0 64 64">
        <path d="M48 32c4.4 0 8-3.6 8-8s-3.6-8-8-8c-.5 0-1 0-1.5.1C45.3 10.5 40.1 6 34 6c-7.7 0-14 6.3-14 14 0 .3 0 .7.1 1C15.2 21.5 12 25 12 29c0 4.4 3.6 8 8 8h28z" fill="#a8b5c4"/>
        <g stroke="#5ac8fa" stroke-width="2" stroke-linecap="round">
          <line x1="20" y1="40" x2="18" y2="50"/><line x1="32" y1="40" x2="30" y2="50"/>
          <line x1="44" y1="40" x2="42" y2="50"/><line x1="26" y1="46" x2="24" y2="56"/>
          <line x1="38" y1="46" x2="36" y2="56"/>
        </g>
      </symbol>
      <symbol id="weather-storm" viewBox="0 0 64 64">
        <path d="M48 32c4.4 0 8-3.6 8-8s-3.6-8-8-8c-.5 0-1 0-1.5.1C45.3 10.5 40.1 6 34 6c-7.7 0-14 6.3-14 14 0 .3 0 .7.1 1C15.2 21.5 12 25 12 29c0 4.4 3.6 8 8 8h28z" fill="#6b7280"/>
        <polygon points="36,34 28,48 34,48 30,60 44,44 38,44 42,34" fill="#ffd60a"/>
        <g stroke="#5ac8fa" stroke-width="2" stroke-linecap="round" opacity="0.7">
          <line x1="20" y1="42" x2="18" y2="50"/><line x1="48" y1="40" x2="46" y2="48"/>
        </g>
      </symbol>
      <symbol id="weather-snow" viewBox="0 0 64 64">
        <path d="M48 32c4.4 0 8-3.6 8-8s-3.6-8-8-8c-.5 0-1 0-1.5.1C45.3 10.5 40.1 6 34 6c-7.7 0-14 6.3-14 14 0 .3 0 .7.1 1C15.2 21.5 12 25 12 29c0 4.4 3.6 8 8 8h28z" fill="#a8b5c4"/>
        <g fill="#e5e5ea">
          <circle cx="20" cy="44" r="3"/><circle cx="32" cy="48" r="3"/>
          <circle cx="44" cy="44" r="3"/><circle cx="26" cy="56" r="3"/>
          <circle cx="38" cy="56" r="3"/>
        </g>
      </symbol>
    </defs>
  </svg>

  <!-- App Container -->
  <div id="app">
    <!-- Status Bar Spacer (for notch) -->
    <div class="status-bar-spacer"></div>

    <!-- Connection Status Banner -->
    <div id="connection-status" class="connection-status connection-status--hidden">
      <svg class="icon icon--sm"><use href="#icon-wifi-off"/></svg>
      <span>Connecting to Home Assistant...</span>
    </div>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content">
      <!-- Home View (default) -->
      <div id="view-home" class="view view--active">
        <!-- Category Pills -->
        <div class="category-pills">
          <button class="category-pill category-pill--active" data-category="all">All</button>
          <button class="category-pill" data-category="lights">Lights</button>
          <button class="category-pill" data-category="switches">Switches</button>
        </div>

        <!-- Rooms List -->
        <div id="rooms-list" class="rooms-list">
          <!-- Rooms will be rendered here -->
        </div>

        <!-- Widgets Section -->
        <div id="widgets-section" class="widgets-section">
          <!-- Weather Widget - content rendered by shared/widgets.js -->
          <div id="weather-widget" class="live-tile">
            <div class="live-tile__loading">Loading weather...</div>
          </div>

          <!-- Notifications Widget - content rendered by shared/widgets.js -->
          <div id="notifications-widget" class="live-tile">
            <div class="live-tile__loading">Loading notifications...</div>
          </div>

          <!-- Shipping Widget - content rendered by shared/widgets.js -->
          <div id="shipping-widget" class="live-tile">
            <div class="live-tile__loading">Loading packages...</div>
          </div>
        </div>
      </div>

      <!-- Room Detail View -->
      <div id="view-room" class="view">
        <header class="room-header">
          <button class="back-btn" id="back-to-home">
            <svg class="icon icon--md"><use href="#icon-chevron-left"/></svg>
          </button>
          <h1 class="room-header__title" id="room-title">Room</h1>
          <button class="view-toggle-btn" id="view-toggle">
            <svg class="icon icon--md"><use href="#icon-list"/></svg>
          </button>
        </header>

        <div id="room-devices" class="room-devices">
          <!-- Device tiles will be rendered here -->
        </div>
      </div>
    </main>

  </div>

  <!-- Control Modal (full-screen sheet) -->
  <div id="control-modal" class="modal">
    <div class="modal__backdrop"></div>
    <div class="modal__sheet">
      <div class="modal__handle"></div>

      <header class="control-modal__header">
        <h2 class="control-modal__title" id="control-modal-title">Light</h2>
        <button class="control-modal__close" id="control-modal-close">
          <svg class="icon icon--md"><use href="#icon-x"/></svg>
        </button>
      </header>

      <div class="control-modal__content">
        <!-- Power Toggle -->
        <div class="control-section">
          <div class="power-toggle" id="power-toggle">
            <div class="power-toggle__track">
              <div class="power-toggle__thumb"></div>
            </div>
            <span class="power-toggle__label" id="power-toggle-label">Off</span>
          </div>
        </div>

        <!-- Brightness Slider -->
        <div class="control-section" id="brightness-section">
          <label class="control-label">Brightness</label>
          <div class="brightness-slider">
            <div class="brightness-slider__track">
              <div class="brightness-slider__fill" id="brightness-fill"></div>
              <div class="brightness-slider__thumb" id="brightness-thumb"></div>
            </div>
            <span class="brightness-slider__value" id="brightness-value">100%</span>
          </div>
        </div>

        <!-- Color Temperature Slider -->
        <div class="control-section" id="color-temp-section" style="display: none;">
          <label class="control-label">Color Temperature</label>
          <div class="color-temp-slider">
            <div class="color-temp-slider__track">
              <div class="color-temp-slider__thumb" id="color-temp-thumb"></div>
            </div>
            <div class="color-temp-slider__labels">
              <span>Warm</span>
              <span>Cool</span>
            </div>
          </div>
        </div>

        <!-- Color Picker -->
        <div class="control-section" id="color-picker-section" style="display: none;">
          <label class="control-label">Color</label>
          <div class="color-picker">
            <canvas id="color-wheel" class="color-picker__wheel" width="280" height="280"></canvas>
            <div class="color-picker__preview" id="color-preview"></div>
          </div>

          <!-- Hex Input -->
          <div class="hex-input-row">
            <label class="hex-input__label">Hex</label>
            <input type="text" id="hex-input" class="hex-input" placeholder="#FFFFFF" maxlength="7">
            <button class="hex-input__apply" id="hex-apply">Apply</button>
          </div>
        </div>

        <!-- Color Palette -->
        <div class="control-section" id="palette-section" style="display: none;">
          <div class="palette-header">
            <label class="control-label">Saved Colors</label>
            <button class="palette-add-btn" id="palette-add">
              <svg class="icon icon--sm"><use href="#icon-plus"/></svg>
            </button>
          </div>
          <div class="color-palette" id="color-palette">
            <!-- Palette colors will be rendered here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../shared/core.js"></script>
  <script src="../shared/widgets.js"></script>
  <script src="mobile.js"></script>
</body>
</html>
